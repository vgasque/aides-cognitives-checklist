name: Déploiement GitHub Pages

# Publie le contenu du dépôt (racine) sur GitHub Pages à chaque push sur `main`.
# L'app est un site statique monofichier (index.html + sw.js + manifest + icônes à la racine) :
# aucun build, on sert les fichiers tels quels. Pré-requis côté dépôt (une seule fois) :
#   Settings → Pages → Build and deployment → Source = « GitHub Actions ».
# (L'autre mode, « Deploy from a branch », fonctionne aussi mais passe par Jekyll ; le fichier
#  .nojekyll à la racine désactive Jekyll dans ce cas. Ce workflow, lui, ne dépend pas de Jekyll.)

on:
  push:
    branches: [main]
  workflow_dispatch:   # permet un déploiement manuel depuis l'onglet Actions

# Droits minimaux requis par le déploiement Pages (jeton OIDC + écriture Pages).
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours (évite de publier
# une version à moitié téléversée).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Téléverser le site (racine du dépôt)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
