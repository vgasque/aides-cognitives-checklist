<!DOCTYPE html>
<!--
===============================================================================
  AIDES COGNITIVES CLINIQUES — Application web hors ligne (PWA)
===============================================================================

  OBJECTIF
  --------
  Bibliothèque d'« aides cognitives » médicales que l'utilisateur (clinicien :
  anesthésie / urgences / réanimation) rédige, modifie et utilise lui-même.
  Une aide cognitive = une fiche de référence pour une situation critique
  (ex. anaphylaxie, ACR, intoxication aux anesthésiques locaux) consultée
  pendant la crise pour ne rien oublier. Principe inspiré des recommandations
  SFAR : "détrompage" = la bonne information, au bon endroit, au bon moment.

  L'application doit fonctionner HORS LIGNE et sans aucun serveur : c'est un
  fichier HTML autonome (HTML + CSS + JavaScript "vanilla", aucune dépendance
  ni bibliothèque externe). Tout est stocké localement sur l'appareil.

  Fichiers du dossier PWA (doivent rester ensemble) :
    - index.html .............. CE fichier = toute l'application
    - sw.js ................... service worker (cache hors ligne)
    - manifest.webmanifest .... métadonnées d'installation PWA
    - icon-*.png .............. icônes de l'app
  L'installation comme app + le cache automatique exigent un hébergement HTTPS
  (GitHub Pages / Netlify / intranet). Ouvert en fichier local, tout marche
  aussi hors ligne, mais sans installation ni service worker.

  FONCTIONNALITÉS
  ---------------
  1. CRUD de fiches : créer / lire / modifier / dupliquer / supprimer.
  2. Structure d'une fiche : confirmation diagnostique, prise en charge,
     à vérifier, ne pas oublier, diagnostics différentiels, références,
     contexte local, images/captures, date de validation.
  3. Checklists CONDITIONNELLES : la "prise en charge" est faite de BLOCS.
     - bloc 'steps'    = liste d'étapes cochables, avec un bloc suivant.
     - bloc 'decision' = question + options, chaque option pointant vers un
       autre bloc (branchement "si oui -> A, si non -> B").
     => arbre décisionnel parcouru pas à pas en mode crise.
  4. ALGORITHME auto : un schéma SVG (organigramme en couches) est généré
     automatiquement à partir des blocs et de leurs liens (buildFlowSVG),
     visible en aperçu dans l'éditeur et à la demande en lecture.
  5. CATÉGORIES colorées éditables (créer / renommer / recolorer / supprimer),
     servant de filtres colorés dans la bibliothèque.
  6. MINUTEURS / COMPTEURS (usage temps réel) définis par fiche :
     - 'stopwatch' = chronomètre (temps écoulé) ;
     - 'interval'  = minuteur à cycle programmable (durée + boucle) qui sonne,
       vibre, clignote et compte les cycles (ex. adrénaline, analyse du rythme) ;
     - compteurs +/- (ex. nombre de doses).
  7. SESSIONS : on enregistre l'état d'utilisation d'une fiche (étapes cochées,
     position dans l'arbre, compteurs, temps/cycles des minuteurs) sous un nom,
     pour la REPRENDRE plus tard ou la SUPPRIMER. Stockées par appareil.
  8. EXPORT / IMPORT JSON (fiches + catégories ; PAS les sessions) = sauvegarde
     et transfert manuel entre appareils. (Pas de synchro cloud automatique :
     impossible dans un PWA statique sans backend ; choix assumé.)

  ARCHITECTURE GÉNÉRALE (voir aussi les commentaires de chaque section JS)
  -----------------------------------------------------------------------
  - PERSISTANCE en couches, choisie au démarrage (chooseBackend) :
      IndexedDB ('ac-db', stores 'fiches'/'meta'/'sessions')  [préféré]
        -> sinon window.storage (clé-valeur fourni par l'hôte)
        -> sinon localStorage
        -> sinon mémoire volatile (objet MEM).
    L'objet `Data` pointe vers le backend retenu et expose une même interface :
      getAll/put/del (fiches), getCats/setCats (catégories),
      getSessions/putSession/delSession (sessions).
  - ÉTAT GLOBAL :
      `state`   = quoi afficher (view library|edit|read, recherche, filtres,
                  brouillon en cours d'édition, fiche affichée, navigation...).
      `Runtime` = état VIVANT d'une fiche ouverte en mode crise (cochages,
                  position, compteurs, minuteurs qui tournent). Survit aux
                  allers-retours bibliothèque<->lecture ; invalidé après édition.
  - RENDU : une seule fonction render() réécrit #main selon state.view, en
    déléguant à renderLibrary / renderEditor / renderRead. Pas de framework :
    le HTML est produit par template strings, puis les écouteurs sont rattachés.
  - Les minuteurs sont rafraîchis par un unique setInterval(updateTimers, 300)
    qui met à jour le DOM par id (sans re-rendu complet) et déclenche les alertes.

  MODÈLE DE DONNÉES (une fiche)
  -----------------------------
  {
    id, title, category(=id de catégorie ou ''), validation('AAAA-MM'),
    localInfo, order(tri),
    confirmation[], verify[], notForget[], differentials[], references[],
    images:   [{ id, data(base64 JPEG réduit), caption }],
    timers:   [{ id, label, type:'stopwatch'|'interval', seconds, autoloop }],
    counters: [{ id, label, step, start }],
    start:    id du bloc de départ,
    blocks:   [ bloc 'steps'    { id, type, title, steps[], image, next(idBloc|null) }
              | bloc 'decision' { id, type, title, question, image,
                                  options:[{ label, target(idBloc) }] } ]
  }
  Catégorie : { id, name, color(hex) }   (collection séparée, store 'meta').
  Session   : { id, ficheId, ficheTitle, name, savedAt,
                checked{'idBloc:index':bool}, nav[idBloc...],
                counters{idCompteur:valeur},
                timers{idMinuteur:{elapsedMs, cycles}} }

  CONVENTIONS / PIÈGES UTILES
  ---------------------------
  - migrate() rend toute fiche ancienne compatible (champs manquants, ancien
    format à étapes plates -> blocs). migrateCategories() convertit les
    anciennes catégories "texte libre" en objets {id,name,color}.
  - state.checked / state.nav PARTAGENT la référence des objets de Runtime
    (même tableau/objet) pour que cocher/naviguer mette à jour la session vive.
  - Après édition d'une fiche, Runtime est invalidé (resetRuntime) puis reconstruit
    pour refléter les nouvelles définitions de minuteurs/compteurs.
  - Images : réduites (downscale, JPEG ~1180px q0.78) car stockées en base64 ;
    le stockage peut saturer -> message + conseil d'export.
  - Audio (alerte minuteur) : nécessite un premier geste utilisateur pour
    débloquer l'AudioContext (créé/réveillé dans ensureAudio).
  - AUCUNE donnée patient n'est prévue ; le contenu clinique est sous la
    responsabilité de l'auteur de la fiche (date de validation à tenir à jour).

  POUR ÉTENDRE (pistes connues, non implémentées)
  -----------------------------------------------
  - Synchro multi-appareils réelle : nécessiterait un backend (Firebase/Supabase)
    + un "code de synchro" ; pose une question de confidentialité (contenu via
    un tiers). Aujourd'hui : export/import manuel uniquement.
  - Partage d'une fiche par lien/QR ; impression déjà gérée (window.print).
===============================================================================
-->
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d5b56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aides cog.">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<title>Aides cognitives</title>
<!-- ============================ STYLES ============================
  Système de design "instrument clinique". Couleurs via variables CSS dans
  :root : teal (--primary) = identité/confirmation ; ambré (--verify) = décisions
  et points à vérifier ; vermillon (--critical) = "ne pas oublier"/urgence.
  Police système pour le texte, mono (--mono) pour les chiffres (minuteurs,
  numéros d'étapes). Le bandeau temps réel (.rt-panel) est volontairement sombre
  pour la lisibilité en crise. Mise en page mobile-first, centrée, max 780px.
  Bloc @media print : épure la fiche pour une sauvegarde papier (masque barres,
  contrôles, minuteurs ; conserve étapes et listes).
-->
<style>
  :root{--ink:#16211f;--ink-soft:#54635f;--line:#d6ddda;--bg:#e9edec;--surface:#fff;--primary:#0d5b56;--primary-dk:#0a4a46;--primary-soft:#e1efec;--critical:#bf3a21;--critical-soft:#fbe9e4;--verify:#946615;--verify-soft:#f6efdd;--radius:14px;--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;--shadow:0 1px 2px rgba(16,32,30,.05),0 6px 22px rgba(16,32,30,.07);}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
  button{font-family:inherit;cursor:pointer}input,textarea,select{font-family:inherit;font-size:16px}textarea{resize:vertical}
  .app{max-width:780px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  header.bar{position:sticky;top:0;z-index:20;background:var(--primary);color:#eaf5f3;padding:calc(14px + env(safe-area-inset-top)) 18px 14px;display:flex;align-items:center;gap:14px}
  .brand{display:flex;flex-direction:column;line-height:1.1;flex:1;min-width:0}
  .brand b{font-size:18px;letter-spacing:.2px;font-weight:650}
  .brand span{font-size:11.5px;text-transform:uppercase;letter-spacing:1.6px;color:#9fcdc7;margin-top:3px}
  .bar-act{background:rgba(255,255,255,.14);color:#eaf5f3;border:0;padding:9px 13px;border-radius:9px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .bar-act:hover{background:rgba(255,255,255,.24)}
  main{flex:1;padding:18px}
  .notice{background:var(--verify-soft);border:1px solid #ecdcb4;color:#6b4d12;border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:16px;display:flex;gap:9px;align-items:flex-start}
  .notice svg{flex-shrink:0;margin-top:1px}
  .lib-top{display:flex;gap:10px;margin-bottom:14px}
  .search{flex:1;position:relative;display:flex;align-items:center}
  .search svg{position:absolute;left:12px;color:var(--ink-soft);pointer-events:none}
  .search input{width:100%;padding:11px 12px 11px 38px;border:1px solid var(--line);border-radius:11px;background:var(--surface);color:var(--ink)}
  .search input:focus{outline:2px solid var(--primary);border-color:transparent}
  .btn-new{background:var(--primary);color:#fff;border:0;border-radius:11px;padding:0 16px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .btn-new:hover{background:var(--primary-dk)}
  .catbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
  .catchip{border:1px solid var(--line);background:var(--surface);padding:5px 12px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer}
  .cards{display:grid;gap:12px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:14px;transition:transform .08s,border-color .12s}
  .card:hover{border-color:#bdcecb;transform:translateY(-1px)}.card:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  .card-body{flex:1;min-width:0}.card h3{margin:0 0 5px;font-size:16.5px;font-weight:640}
  .card-meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .tag{font-size:11px;font-weight:600;letter-spacing:.3px;background:var(--primary-soft);color:var(--primary-dk);padding:3px 9px;border-radius:20px}
  .tag.flow{background:#efe7d2;color:var(--verify)}.tag.sess{background:#dfeae8;color:var(--primary-dk)}
  .card-date{font-size:12px;color:var(--ink-soft)}.card-date.stale{color:var(--critical)}
  .chev{color:#b6c4c1;flex-shrink:0}
  .empty{text-align:center;padding:54px 20px;color:var(--ink-soft);border:1.5px dashed var(--line);border-radius:var(--radius);background:rgba(255,255,255,.5)}
  .empty b{display:block;color:var(--ink);font-size:16px;margin-bottom:6px}
  .read-head h2{margin:0;font-size:24px;font-weight:680;line-height:1.18}
  .read-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 18px}
  .local{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:18px;font-size:14px;color:var(--ink-soft);white-space:pre-wrap}
  section.block{margin-bottom:22px}
  .block-h{display:flex;align-items:center;gap:9px;margin-bottom:11px;font-size:12px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase}
  .block-h .pip{width:9px;height:9px;border-radius:3px;flex-shrink:0}.block-h .spc{flex:1}
  .h-confirm{color:var(--primary-dk)} .h-confirm .pip{background:var(--primary)}
  .h-steps{color:var(--ink)} .h-steps .pip{background:var(--ink)}
  .h-verify{color:var(--verify)} .h-verify .pip{background:var(--verify)}
  .h-forget{color:var(--critical)} .h-forget .pip{background:var(--critical)}
  .h-diff{color:var(--ink-soft)} .h-diff .pip{background:var(--ink-soft)}
  .h-img{color:var(--primary-dk)} .h-img .pip{background:var(--primary)}
  ol.steps{list-style:none;margin:0;padding:0;counter-reset:s}
  ol.steps li{counter-increment:s;display:flex;gap:14px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--ink);border-radius:11px;padding:13px 15px;margin-bottom:9px;cursor:pointer;transition:opacity .12s,background .12s}
  ol.steps li::before{content:counter(s,decimal-leading-zero);font-family:var(--mono);font-size:15px;font-weight:600;color:var(--ink);min-width:26px;padding-top:1px}
  ol.steps li .txt{flex:1;font-size:16px;line-height:1.45;padding-top:1px}
  ol.steps li .box{width:22px;height:22px;border:2px solid #c3cecb;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;margin-top:1px}
  ol.steps li.done{background:#f3f7f5;opacity:.55;border-left-color:var(--primary)}
  ol.steps li.done .box{background:var(--primary);border-color:var(--primary)}
  ol.steps li.done .txt{text-decoration:line-through}
  ul.flat{list-style:none;margin:0;padding:0}
  ul.flat li{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:8px;font-size:15px;display:flex;gap:11px;align-items:flex-start}
  ul.flat li::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;margin-top:8px;opacity:.5}
  ul.forget li{background:var(--critical-soft);border-color:#f0c9bd;color:var(--critical)}
  ul.forget li .ftxt{color:var(--ink)}ul.verify li{border-color:#e8dcbd}ul.diff li{color:var(--ink-soft)}
  .nav-wrap{background:#f4f7f6;border:1px solid var(--line);border-radius:var(--radius);padding:15px 15px 13px;margin-bottom:6px}
  .crumbs{display:flex;flex-wrap:wrap;gap:5px;align-items:center;font-size:11px;color:var(--ink-soft);margin-bottom:12px}
  .crumbs .cb{background:#e4ebe9;padding:2px 8px;border-radius:12px}.crumbs .cb.cur{background:var(--primary);color:#fff}
  .node-title{font-size:13px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:12px}
  .question{font-size:19px;font-weight:650;line-height:1.3;margin:2px 0 16px}
  .options{display:grid;gap:10px}
  .opt{display:flex;align-items:center;gap:11px;text-align:left;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--verify);border-radius:11px;padding:14px 15px;font-size:16px;font-weight:550;color:var(--ink);width:100%}
  .opt:hover{background:#fff;border-color:var(--verify)}.opt .arr{margin-left:auto;color:var(--verify)}
  .flow-ctrl{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}
  .endcap{font-size:13px;color:var(--ink-soft);font-style:italic;margin-top:12px}
  .node-img{width:100%;border-radius:10px;border:1px solid var(--line);margin-bottom:14px;cursor:zoom-in;display:block}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .gthumb img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;display:block}
  .gcap{font-size:11.5px;color:var(--ink-soft);margin-top:4px;line-height:1.3}
  .refs{font-size:12.5px;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:14px;margin-top:24px}
  .refs b{color:var(--ink);display:block;margin-bottom:6px;font-size:11px;letter-spacing:1px;text-transform:uppercase}
  .refs ol{margin:0;padding-left:18px}.refs li{margin-bottom:3px}
  .read-actions{display:flex;gap:9px;flex-wrap:wrap;margin:24px 0 22px}
  /* runtime */
  .rt-panel{background:#0f2a28;border-radius:14px;padding:14px;margin-bottom:14px}
  .rt-head{display:flex;align-items:center;margin-bottom:11px}
  .rt-head b{color:#eaf5f3;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;flex:1}
  .rt-sound{background:rgba(255,255,255,.12);border:0;color:#eaf5f3;border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600}
  .rt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .rt-counters{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:10px}
  .tmcard,.cncard{background:#15403b;border:1px solid #1d524c;border-radius:11px;padding:12px;color:#eaf5f3}
  .cncard{text-align:center}
  .tmcard.flash{animation:fl .5s ease 3}
  @keyframes fl{50%{background:#b5532a;border-color:#d9663a}}
  .tm-label{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:#9fcdc7;margin-bottom:6px}
  .tm-val,.cn-val{font-family:var(--mono);font-size:30px;font-weight:600;letter-spacing:1px;line-height:1.05}
  .tm-cyc{font-size:12px;color:#9fcdc7;margin-top:3px}
  .tm-bar-wrap{height:5px;background:#1d524c;border-radius:3px;margin:8px 0 4px;overflow:hidden}
  .tm-bar{height:100%;background:#5fd0c4;width:0%}
  .tm-ctrl,.cn-ctrl{display:flex;gap:6px;margin-top:9px}
  .cn-ctrl{justify-content:center}
  .tm-btn{flex:1;background:rgba(255,255,255,.12);color:#eaf5f3;border:0;border-radius:8px;padding:8px;font-size:12.5px;font-weight:600}
  .tm-btn:hover{background:rgba(255,255,255,.2)}
  .cn-btn{width:46px;height:40px;border-radius:9px;border:0;background:rgba(255,255,255,.12);color:#eaf5f3;font-size:20px;font-weight:600}
  .cn-btn:hover{background:rgba(255,255,255,.2)}
  .session-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .sess-list{background:#f5f8f7;border:1px solid var(--line);border-radius:11px;padding:6px 10px;margin-bottom:18px}
  .sess-row{display:flex;gap:8px;align-items:center;padding:9px 2px;border-bottom:1px solid var(--line)}
  .sess-row:last-child{border-bottom:0}.sess-row .si{flex:1;min-width:0}
  .sess-row .sn{font-weight:600;font-size:14px}.sess-row .sd{font-size:11.5px;color:var(--ink-soft)}
  /* editor */
  .field{margin-bottom:18px}
  .field>label{display:block;font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:7px}
  .field .hint{font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink-soft);font-size:12px}
  .field input[type=text],.field textarea,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink)}
  .field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--primary);border-color:transparent}
  .row2{display:flex;gap:12px}.row2>.field{flex:1}
  .list-edit .li{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}.list-edit .li input{flex:1}
  .li-num{font-family:var(--mono);font-size:13px;color:var(--ink-soft);min-width:22px;padding-top:12px;text-align:right}
  .mini{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);width:34px;height:42px;border-radius:9px;font-size:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
  .mini:hover{background:#f3f6f5;color:var(--ink)}.mini.del:hover{color:var(--critical);border-color:#eecabe;background:var(--critical-soft)}
  .add-line{margin-top:4px;border:1px dashed var(--line);background:transparent;color:var(--primary-dk);padding:9px 13px;border-radius:9px;font-size:13.5px;font-weight:600;width:100%}
  .add-line:hover{background:var(--primary-soft);border-color:var(--primary-soft)}
  fieldset{border:0;margin:0 0 4px;padding:0}
  .sub2{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft);margin:0 0 8px}
  .trow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .trow input[data-tf],.trow input[data-cf]{flex:1;min-width:130px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .trow input[type=number]{padding:9px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .trow span{font-size:12px;color:var(--ink-soft)}
  .catpick{display:flex;gap:7px;flex-wrap:wrap}
  .catpill{border:1.5px solid var(--line);background:#fff;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer}
  .cat-mgr{background:#f5f8f7;border:1px solid var(--line);border-radius:11px;padding:12px;margin-top:10px}
  .cat-row{display:flex;gap:8px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
  .cat-row input.cn{flex:1;min-width:120px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
